services:
  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      POCKETBASE_URL: http://pocketbase:8090
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@bboyarena.org}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-info@bboyarena.org}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    ports: []
    expose:
      - "8787"
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.api.rule=Host(`${API_HOST:?API_HOST is required}`)
      - traefik.http.routers.api.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.api.loadbalancer.server.port=8787

  pocketbase:
    restart: unless-stopped
    ports: []
    expose:
      - "8090"
    networks:
      - internal
    labels:
      - traefik.enable=false

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
  internal:

